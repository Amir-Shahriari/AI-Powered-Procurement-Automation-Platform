name: AI
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  # numeric stack (stable, fast)
  - numpy=2.0.*
  - scipy=1.14.*
  - scikit-learn=1.5.*
  - pillow>=10.2,<12
  # requests bits used by HF
  - requests=2.32.4
  - urllib3=2.5.0
  - idna=3.10
  - charset-normalizer=3.4.3

  - pip:
      # Tell pip to also use the PyTorch CUDA 12.4 wheels index
      - --extra-index-url https://download.pytorch.org/whl/cu124
      # GPU-enabled PyTorch build
      - torch==2.5.1+cu124
      # NLP stack (versions known to play nice together)
      - transformers==4.46.3
      - sentence-transformers==5.1.0
      - chromadb==0.5.23
      - onnxruntime==1.22.1
      - langchain==0.2.17
      - langchain-community==0.2.19
      - langchain-openai==0.1.20
      - langchain-text-splitters==0.2.4

variables:
  # Skip optional torchvision probing to avoid unnecessary imports
  TRANSFORMERS_NO_TORCHVISION: "1"

